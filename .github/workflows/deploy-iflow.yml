name: Deploy iFlows to QA

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: dev

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      ###########################################################
      # Authenticate
      ###########################################################

      - name: Get OAuth Token
        shell: bash
        env:
          TOKEN_URL: ${{ secrets.SAP_BTP_TOKEN_URL }}
          CLIENT_ID: ${{ secrets.SAP_BTP_OAUTH_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.SAP_BTP_OAUTH_CLIENT_SECRET }}
        run: |

          echo "TOKEN_URL length: ${#TOKEN_URL}"
          echo "CLIENT_ID length: ${#CLIENT_ID}"
          echo "CLIENT_SECRET length: ${#CLIENT_SECRET}"

          if [ -z "$TOKEN_URL" ]; then
          echo "TOKEN_URL is empty"
          exit 1
          fi

          if [ -z "$CLIENT_ID" ]; then
          echo "CLIENT_ID is empty"
          exit 1
          fi

          if [ -z "$CLIENT_SECRET" ]; then
          echo "CLIENT_SECRET is empty"
          exit 1
          fi

          TOKEN_URL="${TOKEN_URL%/}"

          if [[ "$TOKEN_URL" != */oauth/token ]]; then
          TOKEN_URL="$TOKEN_URL/oauth/token"
          fi

          echo "Calling token endpoint..."

          curl -v \
          -u "$CLIENT_ID:$CLIENT_SECRET" \
          -H "Content-Type: application/x-www-form-urlencoded" \
          -d "grant_type=client_credentials" \
          "$TOKEN_URL"

      ###########################################################
      # Find all ZIP files
      ###########################################################

      - name: Find iFlows
        shell: bash
        run: |

          find btp-iflows -name "*.zip" > iflows.txt

          cat iflows.txt

          if [ ! -s iflows.txt ]; then
            echo "No iFlows found."
            exit 1
          fi

      ###########################################################
      # Upload
      ###########################################################

      - name: Upload to QA
        shell: bash
        env:
          CPI_URL: ${{ secrets.QA_CPI_API_BASE_URL }}
        run: |

          while read ZIP
          do

            echo "Uploading $ZIP"

            HTTP=$(curl -s \
              -o response.json \
              -w "%{http_code}" \
              -X POST \
              "$CPI_URL/api/v1/IntegrationDesigntimeArtifacts" \
              -H "Authorization: Bearer $TOKEN" \
              -F "file=@${ZIP}")

            cat response.json

            if [ "$HTTP" != "201" ] && [ "$HTTP" != "200" ]; then
                echo "Upload failed."
                exit 1
            fi

          done < iflows.txt

      ###########################################################
      # Deploy
      ###########################################################

      - name: Deploy iFlows
        shell: bash
        env:
          CPI_URL: ${{ secrets.QA_CPI_API_BASE_URL }}
        run: |

          while read ZIP
          do

            NAME=$(basename "$ZIP")
            NAME=${NAME%%_*}

            echo "Deploying $NAME"

            HTTP=$(curl -s \
              -o deploy.json \
              -w "%{http_code}" \
              -X POST \
              "$CPI_URL/api/v1/DeployIntegrationDesigntimeArtifact?Id=$NAME&Version=active" \
              -H "Authorization: Bearer $TOKEN")

            cat deploy.json

            if [ "$HTTP" != "200" ]; then
                echo "Deployment failed"
                exit 1
            fi

          done < iflows.txt

      ###########################################################
      # Verify
      ###########################################################

      - name: Verify Deployment
        shell: bash
        env:
          CPI_URL: ${{ secrets.QA_CPI_API_BASE_URL }}
        run: |

          while read ZIP
          do

            NAME=$(basename "$ZIP")
            NAME=${NAME%%_*}

            echo "Checking $NAME"

            curl \
              -H "Authorization: Bearer $TOKEN" \
              "$CPI_URL/api/v1/IntegrationRuntimeArtifacts('$NAME')"

          done < iflows.txt
