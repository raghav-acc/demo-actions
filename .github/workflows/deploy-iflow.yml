name: Deploy iFlows to QA

on:
  pull_request:
    branches:
      - develop
    types:
      - closed

permissions:
  contents: write

concurrency:
  group: deploy-qa
  cancel-in-progress: false

env:
  SOURCE_BRANCH: feature
  IFLOW_DIR: btp-iflows
  ARCHIVE_DIR: archive
  ARCHIVE_TAG: ReadyForProd

jobs:

  deploy-qa:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      ##################################################
      # Detect merged iFlows
      ##################################################

      - name: Find merged iFlows
        id: detect
        shell: bash
        run: |

          git diff \
          ${{ github.event.pull_request.base.sha }} \
          ${{ github.event.pull_request.merge_commit_sha }} \
          --name-only \
          | grep ".zip$" \
          > iflows.txt

          if [ ! -s iflows.txt ]; then
            echo "No iFlows found."
            exit 0
          fi

          cat iflows.txt

      ##################################################
      # Get OAuth Token
      ##################################################

      - name: Get OAuth Token
        shell: bash
        env:
          SAP_BTP_TOKEN_URL: ${{ secrets.CTMS_SAP_BTP_TOKEN_URL }}
          SAP_BTP_OAUTH_CLIENT_ID: ${{ secrets.CTMS_SAP_BTP_OAUTH_CLIENT_ID }}
          SAP_BTP_OAUTH_CLIENT_SECRET: ${{ secrets.CTMS_SAP_BTP_OAUTH_CLIENT_SECRET }}
        run: |

          RESPONSE=$(curl -s \
            -X POST "$SAP_BTP_TOKEN_URL" \
            -u "$SAP_BTP_OAUTH_CLIENT_ID:$SAP_BTP_OAUTH_CLIENT_SECRET" \
            -d grant_type=client_credentials)

          TOKEN=$(echo "$RESPONSE" | jq -r '.access_token')

          echo "::add-mask::$TOKEN"

          echo "TOKEN=$TOKEN" >> $GITHUB_ENV

      ##################################################
      # Upload ZIP
      ##################################################

      - name: Upload to CTMS
        shell: bash
        env:
          API_URL: ${{ secrets.SAP_CPI_API_BASE_URL }}
        run: |

          while read ZIP
          do

            echo "Uploading $ZIP"

            RESPONSE=$(curl -s \
              -X POST \
              "$API_URL/v2/files/upload" \
              -H "Authorization: Bearer $TOKEN" \
              -F "file=@${ZIP}")

            echo "$RESPONSE"

          done < iflows.txt

      ##################################################
      # Create Transport Request
      ##################################################

      - name: Create TR
        shell: bash
        env:
          API_URL: ${{ secrets.SAP_CPI_API_BASE_URL }}
          #NODE: ${{ secrets.CTMS_NODE_NAME_QA }}
        run: |

          echo "Create Transport Request"

          # Loop all uploaded fileIds

          # POST /v2/nodes/upload

      ##################################################
      # Wait until deployment completed
      ##################################################

      - name: Wait for deployment
        shell: bash
        run: |

          echo "Polling TR..."

          # GET /transportRequests/{id}

      ##################################################
      # Archive deployed iFlows
      ##################################################

      - name: Archive deployed iFlows
        shell: bash
        run: |

          mkdir -p ${ARCHIVE_DIR}/qa/${ARCHIVE_TAG}

          while read ZIP
          do

            DIR=$(dirname "$ZIP")

            mv "$DIR" \
               ${ARCHIVE_DIR}/qa/${ARCHIVE_TAG}/

          done < iflows.txt

      ##################################################
      # Commit archive
      ##################################################

      - name: Commit archive
        shell: bash
        run: |

          git config user.name github-actions

          git config user.email github-actions@github.com

          git add .

          git commit -m "QA Deployment"

          git push

      ##################################################
      # Tag deployment
      ##################################################

      - name: Create Tag
        shell: bash
        run: |

          TAG=qa-$(date +%Y%m%d-%H%M)

          git tag $TAG

          git push origin $TAG

