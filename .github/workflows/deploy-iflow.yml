name: Deploy SAP Integration Suite iFlows

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: windows-latest

    env:
      SAP_CPI_API_BASE_URL: ${{ secrets.SAP_CPI_API_BASE_URL }}
      SAP_BTP_TOKEN_URL: ${{ secrets.SAP_BTP_TOKEN_URL }}
      SAP_BTP_OAUTH_CLIENT_ID: ${{ secrets.SAP_BTP_OAUTH_CLIENT_ID }}
      SAP_BTP_OAUTH_CLIENT_SECRET: ${{ secrets.SAP_BTP_OAUTH_CLIENT_SECRET }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      ###########################################################
      # OAuth Token
      ###########################################################

      - name: Get OAuth Token
        shell: pwsh
        run: |

          [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12

          $body=@{
            grant_type="client_credentials"
            client_id=$env:SAP_BTP_OAUTH_CLIENT_ID
            client_secret=$env:SAP_BTP_OAUTH_CLIENT_SECRET
          }

          $token=Invoke-RestMethod `
            -Method Post `
            -Uri $env:SAP_BTP_TOKEN_URL `
            -ContentType "application/x-www-form-urlencoded" `
            -Body $body

          if(!$token.access_token){
            throw "Unable to obtain OAuth token."
          }

          "CPI_TOKEN=$($token.access_token)" >> $env:GITHUB_ENV

      ###########################################################
      # CSRF Token
      ###########################################################

      - name: Get CSRF Token
        shell: pwsh
        run: |

          $headers=@{
            Authorization="Bearer $env:CPI_TOKEN"
            "X-CSRF-Token"="Fetch"
          }

          $resp=Invoke-WebRequest `
            -Uri "$env:SAP_CPI_API_BASE_URL/api/v1" `
            -Method GET `
            -Headers $headers

          "CSRF_TOKEN=$($resp.Headers['X-CSRF-Token'])" >> $env:GITHUB_ENV

      ###########################################################
      # Upload & Deploy
      ###########################################################

      - name: Upload and Deploy iFlows
        shell: pwsh
        run: |

          $folder="iflow"

          if(!(Test-Path $folder)){
            throw "iflow folder not found."
          }

          $zipFiles=Get-ChildItem $folder -Filter *.zip

          if($zipFiles.Count -eq 0){
            throw "No ZIP files found."
          }

          $results=@()

          foreach($zip in $zipFiles){

            Write-Host ""
            Write-Host "====================================="
            Write-Host "Processing $($zip.Name)"
            Write-Host "====================================="

            try{

              ###################################################
              # Upload
              ###################################################

              $uploadHeaders=@{
                Authorization="Bearer $env:CPI_TOKEN"
                "X-CSRF-Token"=$env:CSRF_TOKEN
                Accept="application/json"
              }

              Write-Host "Uploading..."

              $uploadResponse=Invoke-RestMethod `
                -Uri "$env:SAP_CPI_API_BASE_URL/api/v1/IntegrationDesigntimeArtifacts" `
                -Method POST `
                -Headers $uploadHeaders `
                -Form @{
                    file=Get-Item $zip.FullName
                }

              Write-Host "Upload successful."

              ###################################################
              # Determine iFlow ID
              ###################################################

              $iflowId=$uploadResponse.Id

              if([string]::IsNullOrWhiteSpace($iflowId)){
                  $iflowId=$zip.BaseName.Split("_")[0]
              }

              Write-Host "iFlow ID = $iflowId"

              ###################################################
              # Deploy
              ###################################################

              $deployUrl="$env:SAP_CPI_API_BASE_URL/api/v1/DeployIntegrationDesigntimeArtifact?Id='$([uri]::EscapeDataString($iflowId))'&Version='active'"

              Invoke-WebRequest `
                -Uri $deployUrl `
                -Method POST `
                -Headers $uploadHeaders

              Write-Host "Deployment successful."

              $results += [PSCustomObject]@{
                File=$zip.Name
                IFlow=$iflowId
                Status="Success"
              }

            }
            catch{

              Write-Host $_

              $results += [PSCustomObject]@{
                File=$zip.Name
                IFlow=""
                Status="Failed"
              }

            }

          }

          New-Item deployment-results -ItemType Directory -Force | Out-Null

          $results |
            ConvertTo-Json -Depth 5 |
            Set-Content deployment-results/deployment-summary.json

          $results | Format-Table

          if(($results | Where Status -eq "Failed").Count -gt 0){
            throw "One or more deployments failed."
          }

      ###########################################################
      # Upload Summary
      ###########################################################

      - name: Upload Deployment Summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deployment-results
          path: deployment-results
