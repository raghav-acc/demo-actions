name: Deploy Validated iFlows to SAP BTP

on:
  #pull_request:
  #  types: [closed]
  #  branches:
  #    - develop # Change to 'main' or your targeted environment branch
  workflow_dispatch:  

permissions:
  contents: read

concurrency:
  group: deploy-iflows-${{ github.ref }}
  cancel-in-progress: false

env:
  DOWNLOAD_DIR: btp-iflows

jobs:
  deploy-iflows:
    name: Deploy to SAP BTP QA Environment
    # Ensure this runs ONLY when a PR is successfully merged, not closed without merging
    #if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    environment: qa # Points to your target deployment environment variables

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2 # Fetch the merge commit and its immediate parent to detect changes

      - name: Setup Git & Tools
        shell: bash
        run: |
          set -euo pipefail
          echo "::notice::Checking for modified iFlow binaries..."

      - name: Detect merged iFlows
        id: detect_changes
        shell: bash
        run: |
          set -uo pipefail
          
          # Find all ZIP files added or updated in the merge commit
          CHANGED_ZIPS=$(git diff --name-only --diff-filter=AM HEAD^ HEAD -- "$DOWNLOAD_DIR/**/*.zip" 2>/dev/null || true)
          
          if [ -z "$CHANGED_ZIPS" ]; then
            echo "No iFlow ZIP files were added or modified in this merge."
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          
          echo "Found matching iFlow binaries for deployment:"
          echo "$CHANGED_ZIPS"
          
          # Save the list to a temporary file for processing
          echo "$CHANGED_ZIPS" > merged-zips.txt
          echo "has_changes=true" >> "$GITHUB_OUTPUT"

      - name: Validate secrets
        if: steps.detect_changes.outputs.has_changes == 'true'
        shell: bash
        env:
          SAP_BTP_TOKEN_URL: ${{ secrets.SAP_BTP_TOKEN_URL }}
          SAP_BTP_OAUTH_CLIENT_ID: ${{ secrets.SAP_BTP_OAUTH_CLIENT_ID }}
          SAP_BTP_OAUTH_CLIENT_SECRET: ${{ secrets.SAP_BTP_OAUTH_CLIENT_SECRET }}
          SAP_CPI_API_BASE_URL: ${{ secrets.SAP_CPI_API_BASE_URL }}
        run: |
          set -euo pipefail
          check_secret() {
            if [ -z "$2" ]; then echo "ERROR: $1 is missing."; exit 1; fi
          }
          check_secret "SAP_BTP_TOKEN_URL" "$SAP_BTP_TOKEN_URL"
          check_secret "SAP_BTP_OAUTH_CLIENT_ID" "$SAP_BTP_OAUTH_CLIENT_ID"
          check_secret "SAP_BTP_OAUTH_CLIENT_SECRET" "$SAP_BTP_OAUTH_CLIENT_SECRET"
          check_secret "SAP_CPI_API_BASE_URL" "$SAP_CPI_API_BASE_URL"

      - name: Get SAP BTP OAuth token
        if: steps.detect_changes.outputs.has_changes == 'true'
        shell: bash
        env:
          SAP_BTP_TOKEN_URL: ${{ secrets.SAP_BTP_TOKEN_URL }}
          SAP_BTP_OAUTH_CLIENT_ID: ${{ secrets.SAP_BTP_OAUTH_CLIENT_ID }}
          SAP_BTP_OAUTH_CLIENT_SECRET: ${{ secrets.SAP_BTP_OAUTH_CLIENT_SECRET }}
        run: |
          set -euo pipefail
          TOKEN_URL="${SAP_BTP_TOKEN_URL%/}"
          [ "${TOKEN_URL%/oauth/token}" = "$TOKEN_URL" ] && TOKEN_URL="$TOKEN_URL/oauth/token"

          RESPONSE=$(curl -sS \
            -w "\nHTTP_CODE=%{http_code}" \
            -X POST "$TOKEN_URL" \
            -u "$SAP_BTP_OAUTH_CLIENT_ID:$SAP_BTP_OAUTH_CLIENT_SECRET" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "grant_type=client_credentials")

          HTTP_CODE=$(echo "$RESPONSE" | sed -n 's/^HTTP_CODE=//p')
          BODY=$(echo "$RESPONSE" | sed '/^HTTP_CODE=/d')

          if [ "$HTTP_CODE" != "200" ]; then
            echo "Auth failed (HTTP $HTTP_CODE)"
            exit 1
          fi

          TOKEN=$(echo "$BODY" | jq -r '.access_token // empty')
          echo "::add-mask::$TOKEN"
          echo "SAP_ACCESS_TOKEN=$TOKEN" >> "$GITHUB_ENV"

      - name: Upload and Deploy iFlows to SAP BTP Runtime
        if: steps.detect_changes.outputs.has_changes == 'true'
        shell: bash
        env:
          SAP_CPI_API_BASE_URL: ${{ secrets.SAP_CPI_API_BASE_URL }}
        run: |
          set -uo pipefail
          API_BASE="${SAP_CPI_API_BASE_URL%/}"
          
          while IFS= read -r zip; do
            [ -z "$zip" ] && continue
            [ ! -f "$zip" ] && continue
            
            # Extract names structurally based on folder hierarchy layout: btp-iflows/SAFE_ID/SAFE_VER/file.zip
            IFLOW_ID=$(basename "$(dirname "$(dirname "$zip")")")
            VERSION=$(basename "$(dirname "$zip")")
            
            echo "════════════════════════════════════════"
            echo "Deploying Artifact: $IFLOW_ID (v$VERSION)"
            
            # Step A: Check if the artifact already exists in the target environment
            ODATA_ID=$(printf "%s" "$IFLOW_ID" | sed "s/'/''/g")
            CHECK_URL="$API_BASE/api/v1/IntegrationDesigntimeArtifacts(Id='$ODATA_ID',Version='$VERSION')?\$format=json"
            
            CHECK_CODE=$(curl -sS -o /dev/null -w "%{http_code}" \
              -X GET "$CHECK_URL" \
              -H "Authorization: Bearer $SAP_ACCESS_TOKEN")
              
            if [ "$CHECK_CODE" = "200" ]; then
              echo "Info: v$VERSION already uploaded to design time. Proceeding directly to deployment phase..."
            else
              echo "Uploading file binary to design time workspace..."
              
              # Step B: Upload the bundle (requires base64 wrapping inside standard OData payload structural definitions)
              BASE64_PAYLOAD=$(base64 -w 0 "$zip")
              
              JSON_PAYLOAD=$(jq -n \
                --arg id "$IFLOW_ID" \
                --arg ver "$VERSION" \
                --arg bytes "$BASE64_PAYLOAD" \
                '{Id: $id, Version: $ver, FileBytes: $bytes}')
                
              UPLOAD_URL="$API_BASE/api/v1/IntegrationDesigntimeArtifacts"
              
              UPLOAD_CODE=$(curl -sS -o upload_response.json -w "%{http_code}" \
                -X POST "$UPLOAD_URL" \
                -H "Authorization: Bearer $SAP_ACCESS_TOKEN" \
                -H "Content-Type: application/json" \
                -H "Accept: application/json" \
                -d "$JSON_PAYLOAD")
                
              if [ "$UPLOAD_CODE" != "201" ] && [ "$UPLOAD_CODE" != "200" ]; then
                echo "::error::Failed uploading structural component $IFLOW_ID (HTTP $UPLOAD_CODE)"
                cat upload_response.json
                exit 1
              fi
              echo "Upload successful."
            fi
            
            # Step C: Trigger Actual Cloud Integration Deployment Action 
            DEPLOY_URL="$API_BASE/api/v1/DeployIntegrationDesigntimeArtifact?Id='$ODATA_ID'&Version='$VERSION'"
            
            DEPLOY_CODE=$(curl -sS -o deploy_response.json -w "%{http_code}" \
              -X POST "$DEPLOY_URL" \
              -H "Authorization: Bearer $SAP_ACCESS_TOKEN" \
              -H "Accept: application/json")
              
            if [ "$DEPLOY_CODE" = "202" ] || [ "$DEPLOY_CODE" = "200" ]; then
              echo "Successfully triggered deployment sequence for $IFLOW_ID."
            else
              echo "::error::Deployment activation sequence failed for $IFLOW_ID (HTTP $DEPLOY_CODE)"
              cat deploy_response.json
              exit 1
            fi
            
          done < merged-zips.txt
