name: QA Deployment

on:
  pull_request:
    branches:
      - develop
    types:
      - closed

permissions:
  contents: write

concurrency:
  group: qa-deployment
  cancel-in-progress: false

env:
  IFLOW_DIR: btp-iflows
  ARCHIVE_DIR: archive/qa
  STATUS_TAG: ReadyForProd

jobs:
  deploy-qa:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    environment: qa

    steps:

      - name: Checkout develop
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Show merge information
        run: |
          echo "Merged PR: #${{ github.event.pull_request.number }}"
          echo "Feature Branch : ${{ github.event.pull_request.head.ref }}"
          echo "Develop Branch : ${{ github.event.pull_request.base.ref }}"

      - name: Identify merged iFlows
        id: detect
        shell: bash
        run: |
          set -e

          git diff \
            ${{ github.event.pull_request.base.sha }} \
            ${{ github.event.pull_request.merge_commit_sha }} \
            --name-only \
            | grep '^btp-iflows/.*\.zip$' \
            | sort -u > iflows.txt || true

          COUNT=$(wc -l < iflows.txt)

          echo "Found $COUNT iFlow(s)."

          if [ "$COUNT" -eq 0 ]; then
            echo "No iFlows to deploy."
            exit 0
          fi

          cat iflows.txt

      - name: Deploy iFlows to QA
        shell: bash
        run: |
          while read ZIP
          do
            [ -z "$ZIP" ] && continue

            echo "----------------------------------"
            echo "Deploying:"
            echo "$ZIP"

		
      
      ###########################################################

      - name: Deploy iFlows
        shell: bash
        env:
          CPI_URL: ${{ secrets.SAP_CPI_API_BASE_URL }}
        run: |
          while read ZIP
          do
            NAME=$(basename "$ZIP")
            NAME=${NAME%%_*}
            echo "Deploying $NAME"
            HTTP=$(curl -s \
              -o deploy.json \
              -w "%{http_code}" \
              -X POST \
              "$CPI_URL/api/v1/DeployIntegrationDesigntimeArtifact?Id=$NAME&Version=active" \
              -H "Authorization: Bearer $TOKEN")
            cat deploy.json
            if [ "$HTTP" != "200" ]; then
                echo "Deployment failed"
                exit 1
            fi
            done < iflows.txt
      ###########################################################
      # Verify
      ###########################################################

      - name: Verify Deployment
        shell: bash
        env:
          CPI_URL: ${{ secrets.QA_CPI_API_BASE_URL }}
        run: |
          while read ZIP
          do
            NAME=$(basename "$ZIP")
            NAME=${NAME%%_*}
            echo "Checking $NAME"
            curl \
              -H "Authorization: Bearer $TOKEN" \
              "$CPI_URL/api/v1/IntegrationRuntimeArtifacts('$NAME')"
          done < iflows.txt

            echo "Deployment Successful"

          done < iflows.txt

      - name: Archive deployed iFlows
        shell: bash
        run: |
          mkdir -p ${ARCHIVE_DIR}/${STATUS_TAG}

          while read ZIP
          do
            [ -z "$ZIP" ] && continue

            VERSION_DIR=$(dirname "$ZIP")
            IFLOW_NAME=$(basename "$(dirname "$VERSION_DIR")")
            VERSION=$(basename "$VERSION_DIR")

            TARGET=${ARCHIVE_DIR}/${STATUS_TAG}/${IFLOW_NAME}/${VERSION}

            mkdir -p "$(dirname "$TARGET")"

            mv "$VERSION_DIR" "$TARGET"

            cat > "$TARGET/deployment-info.json" <<EOF
{
  "iflow":"$IFLOW_NAME",
  "version":"$VERSION",
  "environment":"QA",
  "status":"Ready for PROD",
  "deploymentTime":"$(date -u +"%Y-%m-%dT%H:%M:%SZ")",
  "commit":"${GITHUB_SHA}",
  "workflowRun":"${GITHUB_RUN_ID}"
}
EOF

            echo "$IFLOW_NAME archived."

          done < iflows.txt

      - name: Commit archive changes
        shell: bash
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add archive btp-iflows

          if git diff --cached --quiet
          then
            echo "Nothing to commit."
            exit 0
          fi

          git commit -m "QA Deployment - Ready for PROD"

          git push origin develop

      - name: Create QA Tag
        shell: bash
        run: |
          TAG="qa-ready-for-prod-$(date +%Y%m%d-%H%M%S)"

          git tag -a "$TAG" \
            -m "Ready for PROD deployment"

          git push origin "$TAG"

          echo "Created tag: $TAG"

      - name: Summary
        run: |
          echo "QA Deployment completed successfully."
          echo "Status: Ready for PROD"
          echo "Archive Location:"
          echo "${ARCHIVE_DIR}/${STATUS_TAG}"
