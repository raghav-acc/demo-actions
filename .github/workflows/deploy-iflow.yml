name: Deploy and Archive iFlow

on:
  #pull_request:
  #  branches:
  #    - develop
  #  types:
  #    - closed
  workflow_dispatch:  

permissions:
  contents: write

jobs:
  deploy:
  #  if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    env:
      SAP_BTP_TOKEN_URL: ${{ secrets.SAP_BTP_TOKEN_URL }}
      SAP_BTP_OAUTH_CLIENT_ID: ${{ secrets.SAP_BTP_OAUTH_CLIENT_ID }}
      SAP_BTP_OAUTH_CLIENT_SECRET: ${{ secrets.SAP_BTP_OAUTH_CLIENT_SECRET }}
      SAP_CPI_API_BASE_URL: ${{ secrets.SAP_CPI_API_BASE_URL }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get SAP BTP OAuth token
        shell: bash
        env:
          SAP_BTP_TOKEN_URL: ${{ secrets.SAP_BTP_TOKEN_URL }}
          SAP_BTP_OAUTH_CLIENT_ID: ${{ secrets.SAP_BTP_OAUTH_CLIENT_ID }}
          SAP_BTP_OAUTH_CLIENT_SECRET: ${{ secrets.SAP_BTP_OAUTH_CLIENT_SECRET }}
        run: |
          set -euo pipefail

          TOKEN_URL="${SAP_BTP_TOKEN_URL%/}"
          [ "${TOKEN_URL%/oauth/token}" = "$TOKEN_URL" ] && TOKEN_URL="$TOKEN_URL/oauth/token"

          echo "Requesting SAP OAuth token..."

          RESPONSE=$(curl -sS \
            -w "\nHTTP_CODE=%{http_code}" \
            -X POST "$TOKEN_URL" \
            -u "$SAP_BTP_OAUTH_CLIENT_ID:$SAP_BTP_OAUTH_CLIENT_SECRET" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "grant_type=client_credentials")

          HTTP_CODE=$(echo "$RESPONSE" | sed -n 's/^HTTP_CODE=//p')
          BODY=$(echo "$RESPONSE" | sed '/^HTTP_CODE=/d')

          if [ "$HTTP_CODE" != "200" ]; then
            echo "Token request failed (HTTP $HTTP_CODE)"
            echo "$BODY"
            exit 1
          fi

          TOKEN=$(echo "$BODY" | jq -r '.access_token // empty')
          [ -z "$TOKEN" ] && { echo "No access_token in response"; exit 1; }

          echo "::add-mask::$TOKEN"
          echo "SAP_ACCESS_TOKEN=$TOKEN" >> "$GITHUB_ENV"
          echo "Token obtained."

      - name: Deploy Changed iFlows
        run: |
          for FILE in $FILES
          do
            NAME=$(basename "$FILE" .zip)

            echo "Deploying $NAME"

            curl --fail \
              -X POST \
              "$SAP_CPI_API_BASE_URL/DeployIntegrationDesigntimeArtifact?Id='$NAME'&Version='active'" \
              -H "Authorization: Bearer $ACCESS_TOKEN" \
              -H "Accept: application/json"

            echo "$NAME deployed successfully."
          done

      - name: Archive iFlows
        run: |
          mkdir -p archive

          for FILE in $FILES
          do
            mv "$FILE" archive/
          done

      - name: Commit Archive
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add archive iflows

          if git diff --cached --quiet
          then
            echo "No archive changes."
            exit 0
          fi

          git commit -m "Archive deployed iFlows after PR #${{ github.event.pull_request.number }}"
          git push
