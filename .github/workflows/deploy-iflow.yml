name: QA iFlow Deployment

on:
  workflow_dispatch:  	
  #pull_request:
  #  branches:
  #    - develop
  #  types:
  #    - closed

permissions:
  contents: write


env:
  IFLOW_FOLDER: btp-iflows
  ARCHIVE_FOLDER: archive
  TAG_PREFIX: QA_READY_FOR_PROD


jobs:

  qa-deployment:

    #if: github.event.pull_request.merged == true

    runs-on: ubuntu-latest


    steps:

    - name: Checkout develop
      uses: actions/checkout@v4
      with:
        ref: develop
        fetch-depth: 0



    - name: Identify changed iFlow
      id: iflow
      shell: bash
      run: |

        echo "Finding changed iFlow..."

        FILE=$(git diff HEAD^ HEAD \
          --name-only \
          | grep "${IFLOW_FOLDER}/.*\.zip" \
          | head -1)


        if [ -z "$FILE" ]; then
          echo "No iFlow detected"
          exit 1
        fi


        echo "Found iFlow: $FILE"

        echo "package=$FILE" >> $GITHUB_OUTPUT



    - name: Deploy iFlow to QA
      shell: bash
      run: |

        chmod +x scripts/deploy-iflow.sh


        ./scripts/deploy-iflow.sh \
          "${{ steps.iflow.outputs.package }}"

      env:
        SAP_CPI_API_BASE_URL: ${{ secrets.CPI_QA_URL }}
        SAP_BTP_OAUTH_CLIENT_ID: ${{ secrets.CPI_QA_CLIENT_ID }}
        SAP_BTP_OAUTH_CLIENT_SECRET: ${{ secrets.CPI_QA_CLIENT_SECRET }}



    - name: Archive deployed iFlow
      shell: bash
      run: |

        VERSION=$(date +"%Y%m%d-%H%M%S")


        mkdir -p \
        ${ARCHIVE_FOLDER}/${VERSION}


        mv \
        "${{ steps.iflow.outputs.package }}" \
        ${ARCHIVE_FOLDER}/${VERSION}/



        git config user.name "github-actions"
        git config user.email "github-actions@github.com"



        git add archive


        git commit \
        -m "Archive iFlow after QA deployment ${VERSION}"


        git push origin develop



    - name: Create QA Production Ready Tag
      shell: bash
      run: |

        VERSION=$(date +"%Y.%m.%d.%H%M")

        TAG="${TAG_PREFIX}_${VERSION}"


        git tag \
        -a ${TAG} \
        -m "iFlow deployed successfully in QA and ready for production"


        git push origin ${TAG}



    - name: Deployment completed
      run: |

        echo "=================================="
        echo "QA Deployment Successful"
        echo "Ready for Production"
        echo "=================================="
