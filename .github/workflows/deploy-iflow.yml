name: Deploy SAP CPI iFlow

on:
  push:
    branches:
      - feature

permissions:
  contents: read

env:
  IFLOW_NAME: IFlow_Demo

jobs:

  deploy:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Detect iFlow
      id: detect
      shell: bash
      run: |

        IFLOW=$(find btp-iflows -mindepth 1 -maxdepth 1 -type d -exec basename {} \; | head -1)

        echo "IFLOW_NAME=$IFLOW" >> $GITHUB_ENV

        echo "Detected $IFLOW"

    - name: Package iFlow

      run: |

        cd btp-iflows

        zip -r ../${IFLOW_NAME}.zip ${IFLOW_NAME}

    - name: Get OAuth Token

      id: token

      run: |

        TOKEN=$(curl -s \
        --request POST \
        "${{ secrets.CPI_RUNTIME_TOKEN_URL }}" \
        --header "Content-Type: application/x-www-form-urlencoded" \
        --data "grant_type=client_credentials" \
        --data "client_id=${{ secrets.CPI_RUNTIME_CLIENT_ID }}" \
        --data "client_secret=${{ secrets.CPI_RUNTIME_CLIENT_SECRET }}" \
        | jq -r '.access_token')

        echo "TOKEN=$TOKEN" >> $GITHUB_ENV

    - name: Upload iFlow

      run: |

        curl \
        --request POST \
        "${{ secrets.CPI_DEV_ENDPOINT }}/api/v1/IntegrationDesigntimeArtifacts" \
        --header "Authorization: Bearer $TOKEN" \
        --form "file=@${IFLOW_NAME}.zip"

    - name: Deploy iFlow

      run: |

        curl \
        --request POST \
        "${{ secrets.CPI_DEV_ENDPOINT }}/api/v1/DeployIntegrationDesigntimeArtifact?Id='${IFLOW_NAME}'&Version='active'" \
        --header "Authorization: Bearer $TOKEN"

    - name: Verify Deployment

      run: |

        curl \
        --request GET \
        "${{ secrets.CPI_DEV_ENDPOINT }}/api/v1/IntegrationRuntimeArtifacts('${IFLOW_NAME}')" \
        --header "Authorization: Bearer $TOKEN"
