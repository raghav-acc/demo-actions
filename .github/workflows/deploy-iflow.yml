name: Deploy iFlows to QA via CTMS

on:
  push:
    branches:
      - develop
    paths:
      - 'btp-iflows/**/*.zip'

  workflow_dispatch:
    inputs:
      force_redeploy:
        description: "Force redeploy all iFlows in btp-iflows/"
        required: false
        default: "false"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: write

concurrency:
  group: deploy-to-qa-develop
  cancel-in-progress: false

env:
  SOURCE_BRANCH: develop
  DOWNLOAD_DIR: btp-iflows
  ARCHIVE_DIR: btp-iflows-archive
  ARCHIVE_STATUS_TAG: "deployed-to-qa-awaiting-prod"

jobs:
  deploy-to-qa:
    name: Deploy iFlows to QA via CTMS
    runs-on: ubuntu-latest
    environment: qa

    outputs:
      tr_numbers: ${{ steps.deploy.outputs.tr_numbers }}
      success_count: ${{ steps.deploy.outputs.success_count }}
      failed_count: ${{ steps.deploy.outputs.failed_count }}
      deployment_status: ${{ steps.deploy.outputs.deployment_status }}

    steps:
      - name: Checkout develop branch
        uses: actions/checkout@v4
        with:
          ref: ${{ env.SOURCE_BRANCH }}
          fetch-depth: 0

      - name: Validate CTMS secrets
        shell: bash
        env:
          CPI_RUNTIME_TOKEN_URL: ${{ secrets.CPI_RUNTIME_TOKEN_URL }}
          CPI_RUNTIME_CLIENT_ID: ${{ secrets.CPI_RUNTIME_CLIENT_ID }}
          CPI_RUNTIME_CLIENT_SECRET: ${{ secrets.CPI_RUNTIME_CLIENT_SECRET }}
          CPI_DEV_ENDPOINT: ${{ secrets.CPI_DEV_ENDPOINT }}
          #CTMS_NODE_NAME_QA: ${{ secrets.CTMS_NODE_NAME_QA }}
        run: |
          set -euo pipefail

          echo "CTMS Deployment Configuration"
          echo "Trigger        : ${{ github.event_name }}"
          echo "Source branch  : $SOURCE_BRANCH"
          #echo "QA Node        : $CTMS_NODE_NAME_QA"
          echo "Archive dir    : $ARCHIVE_DIR"

          check_secret() {
            local name="$1" value="$2" prefix="${3:-}"
            if [ -z "${value:-}" ]; then
              echo "ERROR: $name is missing or empty."
              exit 1
            fi
            if [ -n "$prefix" ] && [ "${value#$prefix}" = "$value" ]; then
              echo "ERROR: $name must start with $prefix"
              exit 1
            fi
          }

          check_secret "CPI_RUNTIME_TOKEN_URL" "$CPI_RUNTIME_TOKEN_URL" "https://"
          check_secret "CPI_RUNTIME_CLIENT_ID" "$CPI_RUNTIME_CLIENT_ID"
          check_secret "CPI_RUNTIME_CLIENT_SECRET" "$CPI_RUNTIME_CLIENT_SECRET"
          check_secret "CPI_DEV_ENDPOINT" "$CPI_DEV_ENDPOINT" "https://"
          #check_secret "CTMS_NODE_NAME_QA" "$CTMS_NODE_NAME_QA"

          echo "All CTMS secrets validated."

      - name: Setup Git
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          echo "Git configured."

      - name: Identify iFlows to deploy
        id: identify
        shell: bash
        run: |
          set -euo pipefail

          if [ ! -d "$DOWNLOAD_DIR" ]; then
            echo "::notice title=Nothing to deploy::No $DOWNLOAD_DIR folder found."
            echo "SKIP_DEPLOY=true" >> "$GITHUB_ENV"
            exit 0
          fi

          FORCE_REDEPLOY="${{ github.event.inputs.force_redeploy || 'false' }}"

          if [ "$FORCE_REDEPLOY" = "true" ]; then
            echo "Force redeploy mode: deploying ALL iFlows in $DOWNLOAD_DIR"
            find "$DOWNLOAD_DIR" -name "*.zip" | sort > iflows-to-deploy.txt
          elif [ "${{ github.event_name }}" = "push" ]; then
            echo "Detecting newly merged iFlow ZIPs since previous commit..."
            git diff --name-only HEAD^ HEAD -- "$DOWNLOAD_DIR/**/*.zip" 2>/dev/null | \
              grep -E '\.zip$' | sort -u > iflows-to-deploy.txt || true
          else
            echo "Manual trigger without force: deploying ALL iFlows in $DOWNLOAD_DIR"
            find "$DOWNLOAD_DIR" -name "*.zip" | sort > iflows-to-deploy.txt
          fi

          DEPLOY_COUNT=$(wc -l < iflows-to-deploy.txt | tr -d ' ')

          echo "iFlows to deploy: $DEPLOY_COUNT"

          if [ "$DEPLOY_COUNT" -eq 0 ]; then
            echo "::notice title=Nothing to deploy::No new iFlow ZIPs found."
            echo "SKIP_DEPLOY=true" >> "$GITHUB_ENV"
            exit 0
          fi

          echo "iFlows:"
          cat iflows-to-deploy.txt | sed 's/^/   /'

      - name: Get CTMS OAuth token
        if: env.SKIP_DEPLOY != 'true'
        shell: bash
        env:
          CPI_RUNTIME_TOKEN_URL: ${{ secrets.CPI_RUNTIME_TOKEN_URL }}
          CPI_RUNTIME_CLIENT_ID: ${{ secrets.CPI_RUNTIME_CLIENT_ID }}
          CPI_RUNTIME_CLIENT_SECRET: ${{ secrets.CPI_RUNTIME_CLIENT_SECRET }}
        run: |
          set -euo pipefail

          TOKEN_URL="${CPI_RUNTIME_TOKEN_URL%/}"
          [ "${TOKEN_URL%/oauth/token}" = "$TOKEN_URL" ] && TOKEN_URL="$TOKEN_URL/oauth/token"

          echo "Requesting CTMS OAuth token..."

          RESPONSE=$(curl -sS \
            -w "\nHTTP_CODE=%{http_code}" \
            -X POST "$TOKEN_URL" \
            -u "$CPI_RUNTIME_CLIENT_ID:$CPI_RUNTIME_CLIENT_SECRET" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "grant_type=client_credentials")

          HTTP_CODE=$(echo "$RESPONSE" | sed -n 's/^HTTP_CODE=//p')
          BODY=$(echo "$RESPONSE" | sed '/^HTTP_CODE=/d')

          if [ "$HTTP_CODE" != "200" ]; then
            echo "CTMS Token request failed (HTTP $HTTP_CODE)"
            echo "$BODY"
            exit 1
          fi

          TOKEN=$(echo "$BODY" | jq -r '.access_token // empty')
          [ -z "$TOKEN" ] && { echo "No access_token in response"; exit 1; }

          echo "::add-mask::$TOKEN"
          echo "CTMS_ACCESS_TOKEN=$TOKEN" >> "$GITHUB_ENV"
          echo "CTMS Token obtained."

      - name: Deploy each iFlow to QA via CTMS
        id: deploy
        if: env.SKIP_DEPLOY != 'true'
        shell: bash
        env:
          CPI_DEV_ENDPOINT: ${{ secrets.CPI_DEV_ENDPOINT }}
          #CTMS_NODE_NAME_QA: ${{ secrets.CTMS_NODE_NAME_QA }}
          #CTMS_NAMED_USER: ${{ secrets.CTMS_NAMED_USER }}
        run: |
          set -euo pipefail

          CPI_DEV_ENDPOINT="${CPI_DEV_ENDPOINT%/}"
          NAMED_USER="${CTMS_NAMED_USER:-github-actions[bot]}"

          echo "Starting CTMS deployment to QA node: $CTMS_NODE_NAME_QA"

          echo "[]" > deployment-results.json
          SUCCESS_COUNT=0
          FAILED_COUNT=0
          TR_NUMBERS=""

          while IFS= read -r ZIP_FILE; do
            [ -z "$ZIP_FILE" ] && continue
            [ ! -f "$ZIP_FILE" ] && { echo "Skipping missing: $ZIP_FILE"; continue; }

            # Extract IFLOW_ID and VERSION from path
            # Format: btp-iflows/<IFLOW_ID>/<VERSION>/<IFLOW_ID>_<VERSION>.zip
            IFLOW_DIR=$(dirname "$ZIP_FILE")
            IFLOW_VERSION=$(basename "$IFLOW_DIR")
            IFLOW_ID=$(basename "$(dirname "$IFLOW_DIR")")

            echo "Deploying: $IFLOW_ID | v$IFLOW_VERSION"

            TR_DESCRIPTION="Deploy $IFLOW_ID $IFLOW_VERSION | commit=${GITHUB_SHA:0:7} | run=$GITHUB_RUN_ID"

            # ═══ STEP 1: Upload to CTMS ═══
            echo "Uploading ZIP to CTMS..."
            UPLOAD_RESPONSE=$(curl -sS \
              --connect-timeout 15 \
              --max-time 120 \
              -X POST "$CPI_DEV_ENDPOINT/v2/files/upload" \
              -H "Authorization: Bearer $CTMS_ACCESS_TOKEN" \
              -H "Accept: application/json" \
              -F "file=@$ZIP_FILE" \
              -F "namedUser=$NAMED_USER" 2>/dev/null || echo '{}')

            FILE_ID=$(echo "$UPLOAD_RESPONSE" | jq -r '.fileId // empty')

            if [ -z "$FILE_ID" ]; then
              echo "Upload failed"
              echo "$UPLOAD_RESPONSE"
              FAILED_COUNT=$((FAILED_COUNT + 1))
              jq --arg id "$IFLOW_ID" --arg ver "$IFLOW_VERSION" --arg zip "$ZIP_FILE" \
                 --arg stage "upload" --arg status "Failed" \
                 '. + [{id:$id, version:$ver, zipFile:$zip, failedStage:$stage, status:$status}]' \
                 deployment-results.json > tmp.json && mv tmp.json deployment-results.json
              continue
            fi

            echo "Uploaded. fileId=$FILE_ID"
