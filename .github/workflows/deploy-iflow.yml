name: Deploy iFlows

on:
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy All iFlows
    runs-on: windows-latest
    environment: dev

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Get OAuth Access Token
        shell: pwsh
        env:
          SAP_BTP_TOKEN_URL: ${{ secrets.SAP_BTP_TOKEN_URL }}
          SAP_BTP_OAUTH_CLIENT_ID: ${{ secrets.SAP_BTP_OAUTH_CLIENT_ID }}
          SAP_BTP_OAUTH_CLIENT_SECRET: ${{ secrets.SAP_BTP_OAUTH_CLIENT_SECRET }}
        run: |
          [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12
          $body = @{
            grant_type    = "client_credentials"
            client_id     = $env:SAP_BTP_OAUTH_CLIENT_ID
            client_secret = $env:SAP_BTP_OAUTH_CLIENT_SECRET
          }
          try {
              $response = Invoke-RestMethod `
                  -Method POST `
                  -Uri $env:SAP_BTP_TOKEN_URL `
                  -ContentType "application/x-www-form-urlencoded" `
                  -Body $body
              if (-not $response.access_token) {
                  throw "No access token returned."
              }
              "CPI_DEPLOY_TOKEN=$($response.access_token)" >> $env:GITHUB_ENV
              Write-Host "OAuth token acquired."
          }
          catch {
              Write-Error $_
              exit 1
          }
      - name: Get CSRF Token
        shell: pwsh
        env:
          CPI_BASE_URL: ${{ secrets.CPI_BASE_URL }}
        run: |
          $headers = @{
              Authorization = "Bearer $env:CPI_DEPLOY_TOKEN"
              Accept = "application/json"
              "X-CSRF-Token" = "Fetch"
          }
          try {
              $response = Invoke-WebRequest `
                  -Uri "$env:CPI_BASE_URL/api/v1" `
                  -Method GET `
                  -Headers $headers
              $csrf = $response.Headers["X-CSRF-Token"]
              "CPI_CSRF_TOKEN=$csrf" >> $env:GITHUB_ENV
              Write-Host "CSRF Token fetched."
          }
          catch {
              Write-Host "No CSRF token returned."
              "CPI_CSRF_TOKEN=" >> $env:GITHUB_ENV
          }
      - name: Deploy All iFlows
        shell: pwsh
        env:
          CPI_BASE_URL: ${{ secrets.CPI_BASE_URL }}
        run: |
          $iflowRoot = "iflow"
          if (!(Test-Path $iflowRoot)) {
              throw "Directory '$iflowRoot' not found."
          }
          $resultsDir = "deployment-results"
          New-Item -ItemType Directory -Force -Path $resultsDir | Out-Null
          $deploymentResults = @()
          # Find all iFlow folders
          $iflows = Get-ChildItem $iflowRoot -Directory
          if ($iflows.Count -eq 0) {
              Write-Host "No iFlows found."
              exit 0
          }
          foreach ($iflow in $iflows) {
              $iflowId = $iflow.Name
              Write-Host ""
              Write-Host "Deploying iFlow: $iflowId"
              $deployUrl = "$env:CPI_BASE_URL/api/v1/DeployIntegrationDesigntimeArtifact?Id='$([uri]::EscapeDataString($iflowId))'&Version='active'"
              $headers = @{
                  Authorization = "Bearer $env:CPI_DEPLOY_TOKEN"
                  Accept = "application/json"
              }
              if ($env:CPI_CSRF_TOKEN) {
                  $headers["X-CSRF-Token"] = $env:CPI_CSRF_TOKEN
              }
              try {
                  $response = Invoke-WebRequest `
                      -Uri $deployUrl `
                      -Method POST `
                      -Headers $headers
                  Write-Host "Deployment Successful."
                  $deploymentResults += [PSCustomObject]@{
                      iFlowName = $iflowId
                      Status = "Success"
                      StatusCode = $response.StatusCode
                      Response = $response.Content
                  }
              }
              catch {
                  $status = ""
                  $msg = $_.Exception.Message
                  if ($_.Exception.Response) {
                      $status = $_.Exception.Response.StatusCode.value__
                      try {
                          $reader = New-Object IO.StreamReader($_.Exception.Response.GetResponseStream())
                          $msg = $reader.ReadToEnd()
                      }
                      catch {}
                  }
                  Write-Host "Deployment Failed."
                  $deploymentResults += [PSCustomObject]@{
                      iFlowName = $iflowId
                      Status = "Failed"
                      StatusCode = $status
                      Response = $msg
                  }
              }
              Start-Sleep -Seconds 2
          }
          $deploymentResults |
              ConvertTo-Json -Depth 10 |
              Out-File "$resultsDir/deployment-summary.json"
          Write-Host ""
          Write-Host "Deployment Summary"
          $deploymentResults | Format-Table
          $failed = $deploymentResults | Where-Object Status -eq "Failed"
          if ($failed.Count -gt 0) {
              throw "$($failed.Count) deployment(s) failed."
          }
      - name: Upload Deployment Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deployment-results
          path: deployment-results
