name: Deploy iFlows to QA

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: qa

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Get OAuth Token
        shell: bash
        env:
          SAP_BTP_TOKEN_URL: ${{ secrets.SAP_BTP_TOKEN_URL }}
          SAP_BTP_OAUTH_CLIENT_ID: ${{ secrets.SAP_BTP_OAUTH_CLIENT_ID }}
          SAP_BTP_OAUTH_CLIENT_SECRET: ${{ secrets.SAP_BTP_OAUTH_CLIENT_SECRET }}
        run: |
          set -e

          TOKEN_URL="${SAP_BTP_TOKEN_URL%/}"
          [[ "$TOKEN_URL" != */oauth/token ]] && TOKEN_URL="$TOKEN_URL/oauth/token"

          RESPONSE=$(curl -s \
            -u "$SAP_BTP_OAUTH_CLIENT_ID:$SAP_BTP_OAUTH_CLIENT_SECRET" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "grant_type=client_credentials" \
            "$TOKEN_URL")

          TOKEN=$(echo "$RESPONSE" | jq -r '.access_token')

          if [ -z "$TOKEN" ] || [ "$TOKEN" = "null" ]; then
            echo "Unable to get OAuth token"
            echo "$RESPONSE"
            exit 1
          fi

          echo "::add-mask::$TOKEN"
          echo "TOKEN=$TOKEN" >> $GITHUB_ENV

      - name: Find iFlows
        run: |
          find btp-iflows -name "*.zip" > iflows.txt
          cat iflows.txt

      - name: Upload and Deploy
        shell: bash
        env:
          CPI_URL: ${{ secrets.SAP_CPI_API_BASE_URL }}
        run: |

          API_BASE="${CPI_URL%/}"

          while read ZIP
          do

            [ -z "$ZIP" ] && continue

            FILE=$(basename "$ZIP")

            VERSION=${FILE##*_}
            VERSION=${VERSION%.zip}

            IFLOW=$(echo "$FILE" | sed "s/_${VERSION}.zip//")

            echo "======================================"
            echo "iFlow   : $IFLOW"
            echo "Version : $VERSION"

            echo "Uploading..."

            HTTP=$(curl -sS \
              -o upload.json \
              -w "%{http_code}" \
              -X POST \
              "$API_BASE/api/v1/IntegrationDesigntimeArtifacts" \
              -H "Authorization: Bearer $TOKEN" \
              -H "Accept: application/json" \
              -F "file=@${ZIP}")

            echo "Upload HTTP: $HTTP"
            cat upload.json

            if [ "$HTTP" != "200" ] && [ "$HTTP" != "201" ]; then
              echo "Upload failed."
              exit 1
            fi

            echo "Deploying..."

            HTTP=$(curl -sS \
              -o deploy.json \
              -w "%{http_code}" \
              -X POST \
              "$API_BASE/api/v1/DeployIntegrationDesigntimeArtifact?Id=$IFLOW&Version=$VERSION" \
              -H "Authorization: Bearer $TOKEN")

            echo "Deploy HTTP: $HTTP"
            cat deploy.json

            if [ "$HTTP" != "200" ]; then
              echo "Deployment failed."
              exit 1
            fi

            echo "Waiting for deployment..."

            for i in {1..30}
            do

              STATUS=$(curl -s \
                -H "Authorization: Bearer $TOKEN" \
                "$API_BASE/api/v1/IntegrationRuntimeArtifacts('$IFLOW')" \
                | jq -r '.d.Status // empty')

              echo "Attempt $i : $STATUS"

              if [ "$STATUS" = "STARTED" ] || [ "$STATUS" = "DEPLOYED" ]; then
                echo "Deployment successful."
                break
              fi

              sleep 10

            done

          done < iflows.txt
