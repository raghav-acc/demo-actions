name: Deploy and Archive iFlow

on:
  #pull_request:
  #  branches:
  #    - develop
  #  types:
  #    - closed
  workflow_dispatch:  

permissions:
  contents: write

jobs:
  deploy:
    #if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    env:
      SAP_BTP_TOKEN_URL: ${{ secrets.SAP_BTP_TOKEN_URL }}
      SAP_BTP_OAUTH_CLIENT_ID: ${{ secrets.SAP_BTP_OAUTH_CLIENT_ID }}
      SAP_BTP_OAUTH_CLIENT_SECRET: ${{ secrets.SAP_BTP_OAUTH_CLIENT_SECRET }}
      SAP_CPI_API_BASE_URL: ${{ secrets.SAP_CPI_API_BASE_URL }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get Changed iFlows
        id: changes
        run: |
          FILES=$(git diff --name-only \
            ${{ github.event.pull_request.base.sha }} \
            ${{ github.event.pull_request.merge_commit_sha }} \
            | grep '^iflows/.*\.zip$' || true)

          echo "FILES=$FILES" >> $GITHUB_ENV

      - name: Get OAuth Access Token
        run: |
          TOKEN=$(curl -s -X POST "$SAP_BTP_TOKEN_URL" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "grant_type=client_credentials" \
            -d "SAP_BTP_OAUTH_CLIENT_ID=$SAP_BTP_OAUTH_CLIENT_ID" \
            -d "SAP_BTP_OAUTH_CLIENT_SECRET=$SAP_BTP_OAUTH_CLIENT_SECRET" \
            | jq -r '.access_token')

          if [ "$TOKEN" = "null" ] || [ -z "$TOKEN" ]; then
            echo "Failed to obtain access token"
            exit 1
          fi

          echo "ACCESS_TOKEN=$TOKEN" >> $GITHUB_ENV

      - name: Deploy Changed iFlows
        run: |
          for FILE in $FILES
          do
            NAME=$(basename "$FILE" .zip)

            echo "Deploying $NAME"

            curl --fail \
              -X POST \
              "$SAP_CPI_API_BASE_URL/DeployIntegrationDesigntimeArtifact?Id='$NAME'&Version='active'" \
              -H "Authorization: Bearer $ACCESS_TOKEN" \
              -H "Accept: application/json"

            echo "$NAME deployed successfully."
          done

      - name: Archive iFlows
        run: |
          mkdir -p archive

          for FILE in $FILES
          do
            mv "$FILE" archive/
          done

      - name: Commit Archive
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add archive iflows

          if git diff --cached --quiet
          then
            echo "No archive changes."
            exit 0
          fi

          git commit -m "Archive deployed iFlows after PR #${{ github.event.pull_request.number }}"
          git push
