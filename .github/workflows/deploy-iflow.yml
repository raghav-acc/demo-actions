name: Deploy iFlows to QA

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  deploy-iflows:
    runs-on: ubuntu-latest

    env:
      SAP_BTP_TOKEN_URL: ${{ secrets.SAP_BTP_TOKEN_URL }}
      SAP_BTP_OAUTH_CLIENT_ID: ${{ secrets.SAP_BTP_OAUTH_CLIENT_ID }}
      SAP_BTP_OAUTH_CLIENT_SECRET: ${{ secrets.SAP_BTP_OAUTH_CLIENT_SECRET }}
      SAP_CPI_API_BASE_URL: ${{ secrets.SAP_CPI_API_BASE_URL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get OAuth Access Token
        run: |
          RESPONSE=$(curl -s -X POST "${SAP_BTP_TOKEN_URL}" \
          -H "Content-Type: application/x-www-form-urlencoded" \
          -d "grant_type=client_credentials" \
          -d "client_id=${SAP_BTP_OAUTH_CLIENT_ID}" \
          -d "client_secret=${SAP_BTP_OAUTH_CLIENT_SECRET}")

          echo "$RESPONSE"

          TOKEN=$(echo "$RESPONSE" | jq -r '.access_token')

          if [ -z "$TOKEN" ] || [ "$TOKEN" = "null" ]; then
          echo "Failed to obtain access token"
          exit 1
          fi

          echo "ACCESS_TOKEN=$TOKEN" >> $GITHUB_ENV

      - name: Deploy iFlows
        run: |
          shopt -s globstar nullglob

          for FILE in **/*.zip; do
            IFLOW_ID=$(basename "$FILE" .zip)

            echo "Deploying $IFLOW_ID..."

            HTTP_CODE=$(curl -s -o response.txt -w "%{http_code}" \
              -X POST \
              "${SAP_CPI_API_BASE_URL}/IntegrationDesigntimeArtifacts(Id='${IFLOW_ID}',Version='active')/\$value" \
              -H "Authorization: Bearer ${ACCESS_TOKEN}" \
              -H "Content-Type: application/zip" \
              --data-binary @"$FILE")

            if [[ "$HTTP_CODE" =~ ^20[01]$ ]]; then
              echo "Successfully deployed $IFLOW_ID"
            else
              echo "Deployment failed for $IFLOW_ID"
              cat response.txt
              exit 1
            fi
          done

      - name: Cleanup
        if: always()
        run: rm -f response.txt
