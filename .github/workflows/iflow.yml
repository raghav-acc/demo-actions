name: Backup SAP CPI Ready for Deployment iFlows

on:
  workflow_dispatch:
    inputs:
      target_branch:
        description: "Target branch for iFlow backup"
        required: false
        default: "feature/btp-iflow-backup"

  schedule:
    # 09:00 IST & 18:00 IST
    - cron: "30 3,12 * * *"

permissions:
  contents: write

env:
  DEFAULT_TARGET_BRANCH: feature/btp-iflow-backup
  DOWNLOAD_DIR: btp-iflows
  DEPLOYMENT_MARKER: ReadyForDeployment
  EXTRACT_ZIP: "true"

jobs:
  backup-iflows:
    name: Backup Ready for Deployment iFlows
    runs-on: ubuntu-latest

    environment: dev

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.target_branch || env.DEFAULT_TARGET_BRANCH }}

      - name: Make scripts executable
        run: chmod +x .github/scripts/*.sh

      - name: Resolve runtime variables
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TARGET_BRANCH="${{ github.event.inputs.target_branch }}"
          else
            TARGET_BRANCH="${DEFAULT_TARGET_BRANCH}"
          fi

          echo "TARGET_BRANCH=$TARGET_BRANCH" >> $GITHUB_ENV

          echo "--------------------------------------------"
          echo "Target Branch      : $TARGET_BRANCH"
          echo "Download Folder    : $DOWNLOAD_DIR"
          echo "Deployment Marker  : $DEPLOYMENT_MARKER"
          echo "Extract ZIP        : $EXTRACT_ZIP"
          echo "--------------------------------------------"

      - name: Validate Required Secrets
        env:
          SAP_BTP_TOKEN_URL: ${{ secrets.SAP_BTP_TOKEN_URL }}
          SAP_BTP_OAUTH_CLIENT_ID: ${{ secrets.SAP_BTP_OAUTH_CLIENT_ID }}
          SAP_BTP_OAUTH_CLIENT_SECRET: ${{ secrets.SAP_BTP_OAUTH_CLIENT_SECRET }}
          SAP_CPI_API_BASE_URL: ${{ secrets.SAP_CPI_API_BASE_URL }}
        run: |
          ./.github/scripts/validate-secrets.sh

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Checkout Target Branch
        shell: bash
        run: |
          set -euo pipefail

          git fetch origin

          if git ls-remote --exit-code --heads origin "$TARGET_BRANCH"; then
              git checkout "$TARGET_BRANCH"
              git pull origin "$TARGET_BRANCH"
          else
              git checkout -b "$TARGET_BRANCH"
          fi

      - name: Generate SAP OAuth Token
        env:
          SAP_BTP_TOKEN_URL: ${{ secrets.SAP_BTP_TOKEN_URL }}
          SAP_BTP_OAUTH_CLIENT_ID: ${{ secrets.SAP_BTP_OAUTH_CLIENT_ID }}
          SAP_BTP_OAUTH_CLIENT_SECRET: ${{ secrets.SAP_BTP_OAUTH_CLIENT_SECRET }}
        run: |
          ./.github/scripts/get-token.sh

      - name: Discover Ready for Deployment iFlows
        env:
          SAP_CPI_API_BASE_URL: ${{ secrets.SAP_CPI_API_BASE_URL }}
        run: |
          ./.github/scripts/discover-iflows.sh

      - name: Download Ready for Deployment iFlows
        env:
          SAP_CPI_API_BASE_URL: ${{ secrets.SAP_CPI_API_BASE_URL }}
        run: |
          ./.github/scripts/download-iflow.sh

      - name: Create Backup Manifest
        run: |
          ./.github/scripts/create-manifest.sh

      - name: Commit Changes
        shell: bash
        run: |
          set -euo pipefail

          git add "$DOWNLOAD_DIR"

          if git diff --cached --quiet; then
              echo "No changes detected."
              exit 0
          fi

          git commit -m "Backup ReadyForDeployment iFlows"

          git push origin "$TARGET_BRANCH"

          echo "Backup completed successfully."

      - name: Upload Workflow Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: iflow-backup-report
          path: |
            selected-iflows.json
            matched-iflows.json
            failed-iflows.json
            skipped-iflows.json
            ${{ env.DOWNLOAD_DIR }}/download-manifest.json
          if-no-files-found: ignore
          retention-days: 7

      - name: Workflow Summary
        if: always()
        shell: bash
        run: |
          echo "## SAP CPI Backup Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Target Branch | $TARGET_BRANCH |" >> $GITHUB_STEP_SUMMARY
          echo "| Download Folder | $DOWNLOAD_DIR |" >> $GITHUB_STEP_SUMMARY

          if [[ -f matched-iflows.json ]]; then
            echo "| Downloaded iFlows | $(jq length matched-iflows.json) |" >> $GITHUB_STEP_SUMMARY
          fi

          if [[ -f failed-iflows.json ]]; then
            echo "| Failed Downloads | $(jq length failed-iflows.json) |" >> $GITHUB_STEP_SUMMARY
          fi

          if [[ -f skipped-iflows.json ]]; then
            echo "| Skipped iFlows | $(jq length skipped-iflows.json) |" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Backup workflow completed."
# =====================================================
# JOB 2 - CPILINT TESTING
# =====================================================          

  cpilint-check:
    name: CPI Lint Validation
    runs-on: ubuntu-latest
    needs: backup-iflows

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.target_branch || env.DEFAULT_TARGET_BRANCH }}

      - name: Install Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install CPILint
        run: |
          wget https://github.com/mwittrock/cpilint/releases/download/v1.1.0/cpilint-1.1.0.zip
          unzip -q cpilint-1.1.0.zip -d cpilint
          chmod +x cpilint/cpilint-1.1.0/bin/cpilint
          echo "$GITHUB_WORKSPACE/cpilint/cpilint-1.1.0/bin" >> $GITHUB_PATH

      - name: Verify CPILint installation
        run: |
          pwd
          ls -R
          find . -name cpilint -type f     
      - name: Run CPILint
        shell: bash
        run: |
          chmod +x ./cpilint/cpilint-1.1.0/bin/cpilint
          ./cpilint/cpilint-1.1.0/bin/cpilint -help
         

      - name: Upload CPI Lint Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cpilint-report
          path: |
            cpilint*.*
          if-no-files-found: ignore
