name: Download ReadyForDeployment iFlows from SAP BTP

on:
  workflow_dispatch:
    inputs:
      target_branch:
        description: "Feature branch where downloaded iFlows will be pushed"
        required: false
        default: "feature/btp-iflow-backup"

  schedule:
    # Runs daily at 09:00 IST and 18:00 IST (03:30 & 12:30 UTC)
    - cron: "30 3,12 * * *"

permissions:
  contents: write

env:
  DEPLOYMENT_MARKER: ReadyForDeployment
  DOWNLOAD_DIR: btp-iflows
  EXTRACT_ZIP: "true"
  TARGET_BRANCH: feature/btp-iflow-backup

jobs:
  download-ready-iflows:
    name: Download ReadyForDeployment iFlows
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve runtime configuration
        shell: bash
        run: |
          set -Eeuo pipefail

          TARGET_BRANCH_VALUE="${TARGET_BRANCH}"

          if [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${{ github.event.inputs.target_branch }}" ]]; then
            TARGET_BRANCH_VALUE="${{ github.event.inputs.target_branch }}"
          fi

          echo "TARGET_BRANCH=${TARGET_BRANCH_VALUE}" >> "$GITHUB_ENV"

          echo "::group::Runtime Configuration"
          echo "Target Branch      : ${TARGET_BRANCH_VALUE}"
          echo "Deployment Marker  : ${DEPLOYMENT_MARKER}"
          echo "Download Directory : ${DOWNLOAD_DIR}"
          echo "Extract ZIP        : ${EXTRACT_ZIP}"
          echo "::endgroup::"

      - name: Validate SAP BTP configuration
        shell: bash
        env:
          SAP_BTP_TOKEN_URL: ${{ secrets.SAP_BTP_TOKEN_URL }}
          SAP_BTP_OAUTH_CLIENT_ID: ${{ secrets.SAP_BTP_OAUTH_CLIENT_ID }}
          SAP_BTP_OAUTH_CLIENT_SECRET: ${{ secrets.SAP_BTP_OAUTH_CLIENT_SECRET }}
          SAP_CPI_API_BASE_URL: ${{ secrets.SAP_CPI_API_BASE_URL }}
        run: |
          set -Eeuo pipefail

          echo "::group::Validating Required Secrets"

          required_vars=(
            SAP_BTP_TOKEN_URL
            SAP_BTP_OAUTH_CLIENT_ID
            SAP_BTP_OAUTH_CLIENT_SECRET
            SAP_CPI_API_BASE_URL
          )

          for var in "${required_vars[@]}"; do
            if [[ -z "${!var:-}" ]]; then
              echo "::error::Required secret '${var}' is missing or empty."
              exit 1
            fi
          done

          url_vars=(
            SAP_BTP_TOKEN_URL
            SAP_CPI_API_BASE_URL
          )

          for var in "${url_vars[@]}"; do
            if [[ ! "${!var}" =~ ^https:// ]]; then
              echo "::error::${var} must start with https://"
              exit 1
            fi
          done

          echo "✓ All required secrets are configured."
          echo "::endgroup::"

      - name: Configure Git
        shell: bash
        run: |
          set -Eeuo pipefail

          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          echo "::notice::Git configured successfully."
