---
name: IFLOW's DOWNLOAD AND TEST USING CPILINT & BRUNO PIPELINE
on:
  workflow_dispatch: null
jobs:
  download-iflows:
    runs-on: windows-latest
    env:
      BTP_CLIENT_ID: ${{ secrets.BTP_CLIENT_ID }}
      BTP_CLIENT_SECRET: ${{ secrets.BTP_CLIENT_SECRET }}
      BTP_AUTH_URL: ${{ secrets.BTP_AUTH_URL }}
      BTP_BASE_URL: ${{ secrets.BTP_BASE_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Get OAuth Token
        shell: powershell
        run: |
          $body = @{
          grant_type    = 'client_credentials'
          client_id     = "${env:BTP_CLIENT_ID}"
          client_secret = "${env:BTP_CLIENT_SECRET}"
          }
          $res = Invoke-RestMethod `
          -Method Post `
          -Uri "${env:BTP_AUTH_URL}" `
          -ContentType "application/x-www-form-urlencoded" `
          -Body $body
          "BTP_TOKEN=$($res.access_token)" >> $env:GITHUB_ENV
      - name: List iFlows with Tag 'Ready for Deployment'
        shell: powershell
        run: |
          $OutFile = "deployment_iflows.json"
          $RequiredTag = "ready for deployment"
          $headers = @{
            Authorization = "Bearer $env:BTP_TOKEN"
            Accept = "application/json"
          }
          # Get all design-time iFlows
          $artifacts = Invoke-RestMethod `
            -Uri "$env:BTP_BASE_URL/api/v1/IntegrationRuntimeArtifacts?`$format=json" `
            -Headers $headers
          $selected = @()
          foreach ($artifact in $artifacts.d.results) {
            try {
              $id = $artifact.Id
              $version = $artifact.Version
              Write-Host "Checking tags for $id"
              # Read artifact details including tags
              $detailUri = "$env:BTP_BASE_URL/api/v1/IntegrationRuntimeArtifacts(Id='$id',Version='$version')?`$expand=Tags&`$format=json"
              $details = Invoke-RestMethod `
                -Uri $detailUri `
                -Headers $headers

              $hasTag = $false

              if ($details.d.Tags.results) {
                foreach ($tag in $details.d.Tags.results) {
                  if ($tag.Name -eq $RequiredTag) {
                    $hasTag = $true
                    break
                  }
                }
              }

              if ($hasTag) {
                Write-Host "Found tagged iFlow: $id"

                $selected += [pscustomobject]@{
                  Id      = $id
                  Version = $version
                }
              }

            }
            catch {
              Write-Warning "Failed to read tags for $($artifact.Id)"
            }
          }


          $selected | ConvertTo-Json -Depth 5 | Set-Content $OutFile
      - name: Download iFlows
        shell: powershell
        run: |
          
          New-Item -ItemType Directory -Force -Path iflows


          if (!(Test-Path "recent_iflows.json")) {
            throw "recent_iflows.json not found"
          }


          $rows = Get-Content recent_iflows.json -Raw | ConvertFrom-Json


          foreach ($r in $rows) {

            $headers = @{
              Authorization = "Bearer $env:BTP_TOKEN"
              Accept = "application/zip"
            }

            $uri = "$env:BTP_BASE_URL/api/v1/IntegrationDesigntimeArtifacts(Id='$($r.Id)',Version='$($r.Version)')/`$value"

            $zip = "iflows\$($r.Id)_$($r.Version).zip"

            Write-Host "Downloading $($r.Id)"

            Invoke-WebRequest `
              -Uri $uri `
              -Headers $headers `
              -OutFile $zip
          }
      - name: Upload iFlows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: downloaded-iflows
          path: iflows
