name: Download SAP CPI iFlows

on:
  workflow_dispatch:

jobs:
  download-iflows:
    runs-on: ubuntu-latest

    env:
      CPI_HOST: ${{ secrets.CPI_HOST }}
      CPI_USERNAME: ${{ secrets.CPI_USERNAME }}
      CPI_PASSWORD: ${{ secrets.CPI_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq zip

      - name: Create download folder
        run: |
          mkdir -p iflows
          echo "Folder created"
          ls -la

      - name: Get iFlow list
        run: |
          curl -s \
            -u "$CPI_USERNAME:$CPI_PASSWORD" \
            "https://$CPI_HOST/api/v1/IntegrationDesigntimeArtifacts?\$format=json" \
            > artifacts.json

          jq -r '.d.results[].Id' artifacts.json > iflow_ids.txt

      - name: Download iFlows
        run: |
          while read IFLOW_ID; do
            echo "Downloading $IFLOW_ID"

            curl -L \
              -u "$CPI_USERNAME:$CPI_PASSWORD" \
              -o "iflows/${IFLOW_ID}.zip" \
              "https://$CPI_HOST/api/v1/IntegrationDesigntimeArtifacts(Id='${IFLOW_ID}',Version='active')/\$value"

          done < iflow_ids.txt

      - name: Upload downloaded iFlows
        uses: actions/upload-artifact@v4
        with:
          name: sap-cpi-iflows
          path: iflows/
