name: Download SAP iFlows

on:
  workflow_dispatch:

jobs:
  download-iflows:
    runs-on: ubuntu-latest

    env:
      TOKEN_URL: ${{ secrets.TOKEN_URL }}
      CLIENT_ID: ${{ secrets.BTP_CLIENT_ID }}
      CLIENT_SECRET: ${{ secrets.BTP_CLIENT_SECRET }}
      CPI_API_URL: ${{ secrets.BTP_AUTH_URL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get OAuth Access Token
        id: oauth
        run: |
          ACCESS_TOKEN=$(curl -s -X POST "$TOKEN_URL" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "grant_type=client_credentials" \
            -d "client_id=$CLIENT_ID" \
            -d "client_secret=$CLIENT_SECRET" | jq -r '.access_token')

          echo "ACCESS_TOKEN=$ACCESS_TOKEN" >> $GITHUB_ENV

      - name: Get list of iFlows
        run: |
          curl -s \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            -H "Accept: application/json" \
            "$CPI_API_URL/api/v1/IntegrationDesigntimeArtifacts" \
            > iflows.json

          cat iflows.json

      - name: Download iFlows
        run: |
          mkdir -p iflows

          jq -r '.d.results[].Id' iflows.json | while read IFLOW_ID
          do
            echo "Downloading $IFLOW_ID"

            curl -L \
              -H "Authorization: Bearer $ACCESS_TOKEN" \
              -H "Accept: application/octet-stream" \
              "$CPI_API_URL/api/v1/IntegrationDesigntimeArtifacts(Id='$IFLOW_ID',Version='active')/\$value" \
              -o "iflows/${IFLOW_ID}.zip"
          done

      - name: Upload downloaded iFlows
        uses: actions/upload-artifact@v4
        with:
          name: sap-iflows
          path: iflows/*.zip
