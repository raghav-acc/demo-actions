name: Test SAP Integration Suite Connection

on:
  workflow_dispatch:

jobs:
  test-connection:
    runs-on: ubuntu-latest

    steps:
      - name: Get OAuth Token
        id: token
        run: |
          ACCESS_TOKEN=$(curl -s -X POST "${{ secrets.TOKEN_URL }}" \
            -u "${{ secrets.BTP_CLIENT_ID }}:${{ secrets.BTP_CLIENT_SECRET }}" \
            -d "grant_type=client_credentials" | jq -r '.access_token')

          echo "ACCESS_TOKEN=$ACCESS_TOKEN" >> $GITHUB_ENV

      - name: Test Integration Suite API
        run: |
          curl -s \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            "${{ secrets.IS_HOST }}/api/v1/IntegrationDesigntimeArtifacts" \
            -o response.json

          echo "Response:"
          cat response.json

