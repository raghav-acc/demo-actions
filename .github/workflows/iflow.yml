name: Download iFlows to Repo
on:
  workflow_dispatch:
jobs:
  download-iflows:
    runs-on: windows-latest
    env:
      BTP_CLIENT_ID: ${{ secrets.BTP_CLIENT_ID }}
      BTP_CLIENT_SECRET: ${{ secrets.BTP_CLIENT_SECRET }}
      BTP_AUTH_URL: ${{ secrets.BTP_AUTH_URL }}
      BTP_BASE_URL: ${{ secrets.BTP_BASE_URL }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Get OAuth Token
        shell: powershell
        run: |
            $body = @{
            grant_type    = 'client_credentials'
            client_id     = "${env:BTP_CLIENT_ID}"
            client_secret = "${env:BTP_CLIENT_SECRET}"
            }
            $res = Invoke-RestMethod `
            -Method Post `
            -Uri "${env:BTP_AUTH_URL}" `
            -ContentType "application/x-www-form-urlencoded" `
            -Body $body
            "BTP_TOKEN=$($res.access_token)" >> $env:GITHUB_ENV
      - name: List ReadyForDeployment iFlows
        shell: powershell
        run: |
          $headers = @{
            Authorization = "Bearer $env:BTP_TOKEN"
            Accept        = "application/json"
          }

          $OutFile = "ready_iflows.json"

          # Get all design-time artifacts
          $artifacts = Invoke-RestMethod `
            -Uri "$env:BTP_BASE_URL/api/v1/IntegrationDesigntimeArtifacts?`$format=json" `
            -Headers $headers

          $ready = @()

          foreach ($artifact in $artifacts.d.results) {

            $id = $artifact.Id
            $version = $artifact.Version

            Write-Host "Checking tags for $id"

            try {

              $detail = Invoke-RestMethod `
                -Uri "$env:BTP_BASE_URL/api/v1/IntegrationDesigntimeArtifacts(Id='$id',Version='$version')?`$expand=Tags&`$format=json" `
                -Headers $headers

              $tags = @()

              if ($detail.d.Tags.results) {
                $tags = $detail.d.Tags.results.Name
              }

              if ($tags -contains "ReadyForDeployment") {

                $ready += [PSCustomObject]@{
                  Id      = $id
                  Version = $version
                }

                Write-Host "Found ReadyForDeployment: $id"

              }

            }
            catch {
              Write-Warning "Failed to read tags for $id"
            }

          }

          $ready | ConvertTo-Json -Depth 5 | Set-Content $OutFile


      - name: Download ReadyForDeployment iFlows
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path iflow

          $rows = Get-Content ready_iflows.json -Raw | ConvertFrom-Json

          foreach ($r in $rows) {

            Write-Host "Downloading $($r.Id)"

            $headers = @{
              Authorization = "Bearer $env:BTP_TOKEN"
              Accept        = "application/zip"
            }

            $uri = "$env:BTP_BASE_URL/api/v1/IntegrationDesigntimeArtifacts(Id='$($r.Id)',Version='$($r.Version)')/`$value"

            $zip = "iflow\$($r.Id)_$($r.Version).zip"

            Invoke-WebRequest `
              -Uri $uri `
              -Headers $headers `
              -OutFile $zip
          }

      - name: Commit Downloaded iFlows
        shell: powershell
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add iflow/
          git diff --staged --quiet
          if ($LASTEXITCODE -eq 0) {
          Write-Host "No changes to commit"
          exit 0
          }
          git commit -m "Downloaded latest iFlows"
          git push
