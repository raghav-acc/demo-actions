name: List SAP Integration Suite iFlows

on:
  workflow_dispatch:

jobs:
  list-iflows:
    runs-on: ubuntu-latest

    env:
      TOKEN_URL: ${{ secrets.TOKEN_URL }}
      CLIENT_ID: ${{ secrets.BTP_CLIENT_ID }}
      CLIENT_SECRET: ${{ secrets.BTP_CLIENT_SECRET }}
      IS_HOST: ${{ secrets.IS_HOST }}

    steps:

      - name: Install jq
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Get OAuth Token
        run: |

          TOKEN=$(curl -s \
            --request POST \
            "$TOKEN_URL" \
            --user "$CLIENT_ID:$CLIENT_SECRET" \
            --data "grant_type=client_credentials" \
            | jq -r '.access_token')

          if [ -z "$TOKEN" ] || [ "$TOKEN" = "null" ]; then
            echo "Failed to obtain access token"
            exit 1
          fi

          echo "TOKEN=$TOKEN" >> $GITHUB_ENV

      - name: Get Integration Artifacts
        run: |

          curl -s \
            -H "Authorization: Bearer $TOKEN" \
            -H "Accept: application/json" \
            "$IS_HOST/api/v1/IntegrationDesigntimeArtifacts?\$format=json" \
            -o response.json

          echo "Response received"

          cat response.json

      - name: List iFlow IDs
        run: |
          echo "Available iFlows"

    if jq -e '.d.results' response.json > /dev/null; then
      jq -r '.d.results[] | "\(.Id) | \(.Name) | Version \(.Version)"' response.json
    else
      echo "Unexpected SAP API response:"
      cat response.json
      exit 1
    fi
